<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Lab</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #1a1a1a;
        --muted: #888;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --fg: #eeeeee;
          --muted: #666;
        }
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background-color: var(--bg);
        color: var(--fg);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 40px 20px;
        -webkit-font-smoothing: antialiased;
      }

      main {
        width: 100%;
        max-width: 480px;
      }

      h1 {
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        margin-bottom: 4rem;
        color: var(--muted);
      }

      nav ul {
        list-style: none;
        padding: 0;
      }

      nav li {
        display: flex;
        align-items: baseline;
        margin-bottom: 1.5rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid transparent;
        transition: border-color 0.3s ease;
      }

      nav li:hover {
        border-bottom-color: var(--fg);
      }

      .index {
        font-size: 0.75rem;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        color: var(--muted);
        margin-right: 1.5rem;
        width: 1.5rem;
      }

      nav a {
        color: var(--fg);
        text-decoration: none;
        font-size: 1.25rem;
        font-weight: 400;
        letter-spacing: -0.01em;
        transition: transform 0.2s ease;
        display: inline-block;
      }

      nav li:hover a {
        transform: translateX(4px);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>JS Lab</h1>
      <nav>
        <ul>
          <li>
            <span class="index">01</span>
            <a href="geom-viewer/index.html">Geometry Viewer</a>
          </li>
          <!-- Future links -->
        </ul>
      </nav>
    </main>
  </body>
</html>

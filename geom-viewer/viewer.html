<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Geometry Visualizer</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/viewer.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="visualizer-container">
      <canvas id="canvas"></canvas>

      <div id="ui-layer">
        <nav class="top-nav">
          <a href="index.html" class="back-link">← Gallery</a>
        </nav>

        <h1 id="shape-title">Loading...</h1>

        <button id="info-toggle" aria-label="Show Information">
          <span class="icon">i</span>
        </button>

        <section id="content-section" class="hidden">
          <div class="info-overlay-content">
            <div class="info-block">
              <h3>Description</h3>
              <div id="shape-desc"></div>
            </div>

            <div class="info-block" id="formulas-block">
              <h3>Mathematical Background</h3>
              <div id="formula-list"></div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <nav id="bottom-nav">
      <div class="nav-container">
        <div class="shape-nav">
          <a id="prev-shape" href="#" class="nav-btn">← Previous</a>
          <a id="next-shape" href="#" class="nav-btn">Next →</a>
        </div>
      </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js"></script>
    <script type="module" src="js/viewer.js"></script>
  </body>
</html>
